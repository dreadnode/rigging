---
name: Update PR Description with Rigging

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-description:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # full history for proper diffing

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Generate PR Description
        id: description
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DESCRIPTION="$(uv run --no-project .hooks/generate_pr_description.py --base-ref "origin/${{ github.base_ref }}" --exclude "./*.lock")"
          {
            echo "description<<EOF"
            echo "${DESCRIPTION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update PR Description
        uses: nefrob/pr-description@30859d560129561327a48ec569ec3b6aa62dd2c9 # v1.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          content: |

            ---

            ## Generated Summary

            ${{ steps.description.outputs.description }}

            This summary was generated with ❤️ by [rigging](https://docs.dreadnode.io/rigging/)
